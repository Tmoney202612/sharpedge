<!-- LIVE SCORES ENGINE - Powers all tabs with real-time scores -->
<script>
(function(){
  // Global scores cache
  var scoresCache = {};
  var scoresLastFetch = 0;
  var CACHE_MS = 90000; // 90 seconds

  // Fetch all live scores
  function fetchScores(callback) {
    var now = Date.now();
    if (now - scoresLastFetch < CACHE_MS && Object.keys(scoresCache).length > 0) {
      if (callback) callback(scoresCache);
      return;
    }
    fetch('/api/scores')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var games = Array.isArray(data) ? data : (data.games || data.data || []);
        scoresCache = {};
        games.forEach(function(g) {
          // Key by both team names for easy lookup
          var key1 = (g.home_team || '').toLowerCase() + '|' + (g.away_team || '').toLowerCase();
          var key2 = (g.away_team || '').toLowerCase() + '|' + (g.home_team || '').toLowerCase();
          scoresCache[key1] = g;
          scoresCache[key2] = g;
          // Also key by sport_key + teams
          if (g.sport_key) {
            scoresCache[g.sport_key + '|' + key1] = g;
            scoresCache[g.sport_key + '|' + key2] = g;
          }
        });
        scoresLastFetch = now;
        if (callback) callback(scoresCache);
        // Inject scores into visible rows
        injectScoresIntoRows(games);
        // Update Live Now panel
        renderLivePanel(games);
      })
      .catch(function(e) {
        console.error('Scores fetch error:', e);
        if (callback) callback(scoresCache);
      });
  }

  // Find score for a matchup
  function findScore(homeTeam, awayTeam) {
    if (!homeTeam || !awayTeam) return null;
    var key = homeTeam.toLowerCase() + '|' + awayTeam.toLowerCase();
    return scoresCache[key] || null;
  }

  // Get score display text
  function getScoreDisplay(game) {
    if (!game) return '';
    var homeScore = '--', awayScore = '--';
    if (Array.isArray(game.scores) && game.scores.length > 0) {
      game.scores.forEach(function(s) {
        if (s.name === game.home_team) homeScore = s.score != null ? s.score : '--';
        if (s.name === game.away_team) awayScore = s.score != null ? s.score : '--';
      });
    }
    var status = game.completed ? 'FINAL' : (game.last_update ? 'LIVE' : '');
    return { homeScore: homeScore, awayScore: awayScore, status: status };
  }

  // Inject scores into all visible bet rows across all tabs
  function injectScoresIntoRows(games) {
    // Find all elements that contain team matchups
    var rows = document.querySelectorAll('[data-home-team], [data-away-team]');
    rows.forEach(function(row) {
      var home = row.getAttribute('data-home-team');
      var away = row.getAttribute('data-away-team');
      var game = findScore(home, away);
      var scoreEl = row.querySelector('.live-score-badge');
      if (game) {
        var sd = getScoreDisplay(game);
        if (!scoreEl) {
          scoreEl = document.createElement('div');
          scoreEl.className = 'live-score-badge';
          scoreEl.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;margin-left:8px;color:#fff;';
          // Find the event/matchup text area and append
          var eventArea = row.querySelector('.event-info, .matchup-text, td:nth-child(2), .bet-event');
          if (eventArea) eventArea.appendChild(scoreEl);
          else row.appendChild(scoreEl);
        }
        var statusColor = sd.status === 'LIVE' ? '#ef4444' : sd.status === 'FINAL' ? '#94a3b8' : '#3b82f6';
        var statusDot = sd.status === 'LIVE' ? '<span style="width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 1.5s infinite;display:inline-block;"></span>' : '';
        scoreEl.innerHTML = statusDot + '<span style="color:' + statusColor + ';">' + (sd.status || 'UPCOMING') + '</span> <span>' + sd.awayScore + ' - ' + sd.homeScore + '</span>';
      }
    });

    // Also try to match by text content in bet rows
    var allRows = document.querySelectorAll('.bet-row, .ev-row, .arb-row, .scanner-row, tr[data-game], .game-row');
    allRows.forEach(function(row) {
      if (row.querySelector('.live-score-injected')) return;
      var text = row.textContent || '';
      games.forEach(function(g) {
        if (!g.home_team || !g.away_team) return;
        if (text.indexOf(g.home_team) > -1 || text.indexOf(g.away_team) > -1) {
          var sd = getScoreDisplay(g);
          if (sd.homeScore === '--' && sd.awayScore === '--' && !sd.status) return;
          var badge = document.createElement('span');
          badge.className = 'live-score-injected';
          badge.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px;color:#fff;white-space:nowrap;';
          var statusColor = sd.status === 'LIVE' ? '#ef4444' : sd.status === 'FINAL' ? '#94a3b8' : '#3b82f6';
          var dot = sd.status === 'LIVE' ? '<span style="width:5px;height:5px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulse 1.5s infinite;"></span>' : '';
          badge.innerHTML = dot + '<span style="color:' + statusColor + ';font-size:10px;">' + (sd.status || '') + '</span> ' + sd.awayScore + '-' + sd.homeScore;
          // Find the cell/div with team names
          var cells = row.querySelectorAll('td, div');
          for (var i = 0; i < cells.length; i++) {
            var ct = cells[i].textContent || '';
            if (ct.indexOf(g.home_team) > -1 || ct.indexOf(g.away_team) > -1) {
              cells[i].appendChild(badge);
              break;
            }
          }
        }
      });
    });
  }

  // =============================================
  // LIVE NOW PANEL - Shows all live games
  // =============================================
  function renderLivePanel(games) {
    var panel = document.getElementById('panel-live');
    if (!panel) return;

    // Separate games by status
    var liveGames = games.filter(function(g) { return g.last_update && !g.completed; });
    var upcomingGames = games.filter(function(g) { return !g.last_update && !g.completed; });
    var completedGames = games.filter(function(g) { return g.completed; });

    // Count by sport
    var sportCounts = {};
    var allLive = liveGames.concat(upcomingGames);
    allLive.forEach(function(g) {
      var sport = g.sport_title || g.sport_key || 'Other';
      sportCounts[sport] = (sportCounts[sport] || 0) + 1;
    });

    // Find best EV (if we have that data)
    var bestEV = '+0%';

    // Update stat cards
    var statCards = panel.querySelectorAll('.stat-card, .live-stat');
    // Try to update the numbers in the existing stat structure
    var liveCountEl = panel.querySelector('[data-stat="live-count"]');
    var soonCountEl = panel.querySelector('[data-stat="soon-count"]');

    // Update sport filter buttons with counts
    var sportFilters = panel.querySelectorAll('[data-sport-filter], [id^="sport-"], [id^="count-"]');
    sportFilters.forEach(function(el) {
      var sportKey = el.id ? el.id.replace('count-', '').replace('sport-', '') : '';
      if (sportKey && el.id.startsWith('count-')) {
        var count = 0;
        allLive.forEach(function(g) { if (g.sport_key === sportKey) count++; });
        el.textContent = count;
      }
    });

    // Find or create the games container
    var gamesContainer = panel.querySelector('.live-games-container, .live-games-list, #live-games');
    if (!gamesContainer) {
      // Look for the scanning spinner and replace it
      var spinner = panel.querySelector('.scanning-spinner, [class*="spinner"], [class*="loading"]');
      if (spinner) {
        gamesContainer = document.createElement('div');
        gamesContainer.id = 'live-games';
        gamesContainer.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px 0;';
        spinner.parentNode.replaceChild(gamesContainer, spinner);
      } else {
        // Find the area after sport filters
        var filtersArea = panel.querySelector('.sport-filters, .sport-pills');
        if (filtersArea) {
          gamesContainer = document.createElement('div');
          gamesContainer.id = 'live-games';
          gamesContainer.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px 0;';
          filtersArea.parentNode.insertBefore(gamesContainer, filtersArea.nextSibling);
        }
      }
    }

    // Also try to find the scanning text
    if (!gamesContainer) {
      var allDivs = panel.querySelectorAll('div');
      for (var i = 0; i < allDivs.length; i++) {
        if ((allDivs[i].textContent || '').indexOf('Scanning') > -1 && allDivs[i].children.length < 3) {
          gamesContainer = document.createElement('div');
          gamesContainer.id = 'live-games';
          gamesContainer.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px 0;';
          allDivs[i].innerHTML = '';
          allDivs[i].appendChild(gamesContainer);
          break;
        }
      }
    }

    if (!gamesContainer) return;

    var allDisplayGames = liveGames.concat(upcomingGames).concat(completedGames);

    if (allDisplayGames.length === 0) {
      gamesContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted,#5a6480);">No live or upcoming games right now.</div>';
      return;
    }

    gamesContainer.innerHTML = allDisplayGames.map(function(g) {
      var sd = getScoreDisplay(g);
      var statusColor = sd.status === 'LIVE' ? '#ef4444' : sd.status === 'FINAL' ? '#64748b' : 'var(--accent,#3b82f6)';
      var borderColor = sd.status === 'LIVE' ? '#ef4444' : sd.status === 'FINAL' ? '#334155' : 'var(--border,#1e2536)';
      var league = g.sport_title || g.sport_key || '';
      var dot = sd.status === 'LIVE' ? '<span style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulse 1.5s infinite;margin-right:4px;"></span>' : '';
      var time = '';
      if (g.commence_time && !g.completed && !g.last_update) {
        var d = new Date(g.commence_time);
        time = d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
      }

      return '<div data-sport-key="' + (g.sport_key || '') + '" style="background:var(--card,#141820);border:1px solid ' + borderColor + ';border-left:3px solid ' + statusColor + ';border-radius:10px;padding:14px;">'
        + '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted,#5a6480);margin-bottom:10px;letter-spacing:0.5px;text-transform:uppercase;">'
        + '<span>' + league + '</span>'
        + '<span style="color:' + statusColor + ';font-weight:700;">' + dot + (sd.status || time || 'UPCOMING') + '</span>'
        + '</div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;color:#fff;">'
        + '<span style="font-size:14px;font-weight:500;">' + (g.away_team || 'TBD') + '</span>'
        + '<strong style="font-size:20px;font-variant-numeric:tabular-nums;color:' + (sd.status === 'LIVE' ? '#fff' : '#94a3b8') + ';">' + sd.awayScore + '</strong>'
        + '</div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid var(--border,#1e2536);color:#fff;">'
        + '<span style="font-size:14px;font-weight:500;">' + (g.home_team || 'TBD') + '</span>'
        + '<strong style="font-size:20px;font-variant-numeric:tabular-nums;color:' + (sd.status === 'LIVE' ? '#fff' : '#94a3b8') + ';">' + sd.homeScore + '</strong>'
        + '</div>'
        + '</div>';
    }).join('');

    // Update the stat numbers at the top
    var statNums = panel.querySelectorAll('div');
    statNums.forEach(function(el) {
      var t = el.textContent.trim();
      // Update LIVE/SOON count
      if (el.previousElementSibling && el.previousElementSibling.textContent.indexOf('Live') > -1) {
        // skip
      }
    });

    // Wire up sport filter clicks
    var filterBtns = panel.querySelectorAll('[id^="sport-"]');
    filterBtns.forEach(function(btn) {
      if (btn._wired) return;
      btn._wired = true;
      btn.addEventListener('click', function() {
        var sportKey = this.id.replace('sport-', '');
        var cards = gamesContainer.querySelectorAll('[data-sport-key]');
        filterBtns.forEach(function(b) { b.style.borderColor = 'var(--border,#1e2536)'; b.style.opacity = '0.6'; });
        this.style.borderColor = 'var(--accent,#3b82f6)';
        this.style.opacity = '1';
        cards.forEach(function(card) {
          if (sportKey === 'all' || !sportKey) {
            card.style.display = '';
          } else {
            card.style.display = card.getAttribute('data-sport-key').indexOf(sportKey) > -1 ? '' : 'none';
          }
        });
      });
    });
  }

  // =============================================
  // INITIALIZATION & AUTO-REFRESH
  // =============================================

  // Override showTab to trigger score injection when switching tabs
  var _origShowTab = window.showTab;
  window.showTab = function(id, btn) {
    if (_origShowTab) _origShowTab(id, btn);
    // Re-inject scores after tab switch
    setTimeout(function() { fetchScores(); }, 300);
  };

  // Initial fetch
  fetchScores();

  // Auto-refresh every 90 seconds
  setInterval(function() { fetchScores(); }, CACHE_MS);

  // Also re-inject after any dynamic content loads
  var observer = new MutationObserver(function(mutations) {
    var shouldUpdate = false;
    mutations.forEach(function(m) {
      if (m.addedNodes.length > 0) shouldUpdate = true;
    });
    if (shouldUpdate) {
      setTimeout(function() {
        fetchScores(function() {});
      }, 500);
    }
  });

  // Observe the main app container for changes
  var appEl = document.getElementById('app') || document.querySelector('.scanner-container') || document.body;
  observer.observe(appEl, { childList: true, subtree: true });

})();
</script>
